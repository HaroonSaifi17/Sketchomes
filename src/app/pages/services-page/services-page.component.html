<app-navbar></app-navbar>

<main>
  <section class="hero-banner" style="background-image: url('/assets/images/hero2.webp')">
    <div class="hero-overlay"></div>
    <div class="hero-content max-w-screen-2xl mx-auto px-[5vw]">
      <p class="hero-kicker">Services</p>
      <h1 class="hero-title">Complete interior solutions from concept to execution</h1>
    </div>
  </section>

  <section class="content-wrap">
    <div class="max-w-screen-2xl mx-auto px-[5vw] py-20">
      <div class="cards-grid">
        @for (service of services; track service.title; let i = $index) {
          <article
            class="service-card reveal-fade-up"
            [style.animation-delay]="i * 0.12 + 's'"
            [style.background-image]="'url(' + service.image + ')'"
          >
            <div class="service-layer">
              <h2>{{ service.title }}</h2>
              <p>{{ service.copy }}</p>
            </div>
          </article>
        }
      </div>
    </div>
  </section>

  <section class="process-wrap">
    <div class="max-w-screen-xl mx-auto px-[5vw] py-20">
      <h2 class="section-title reveal-fade-up">Our Process</h2>
      <ol class="process-list">
        @for (step of process; track step; let i = $index) {
          <li class="reveal-fade-up" [style.animation-delay]="i * 0.1 + 's'">
            <span>{{ i + 1 }}</span>
            <p>{{ step }}</p>
          </li>
        }
      </ol>
    </div>
  </section>
</main>

<app-footer></app-footer>
